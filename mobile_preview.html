<!DOCTYPE html>
<html lang="uz" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PayZa Fintech App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #0A0F1C; color: #E2E8F0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* Glassmorphism Classes */
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-nav { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Binance Style Balance Card */
        .balance-card {
            background: linear-gradient(145deg, rgba(30,64,175,0.2) 0%, rgba(15,23,42,0.8) 100%);
            border: 1px solid rgba(59, 130, 246, 0.2);
            position: relative; overflow: hidden;
        }
        .balance-card::before {
            content: ''; position: absolute; top: -50px; right: -50px; width: 150px; height: 150px;
            background: rgba(59, 130, 246, 0.3); filter: blur(50px); border-radius: 50%;
        }
        .balance-card::after {
            content: ''; position: absolute; bottom: -50px; left: -50px; width: 150px; height: 150px;
            background: rgba(16, 185, 129, 0.2); filter: blur(50px); border-radius: 50%;
        }

        /* Bottom Nav */
        .nav-bottom-bar {
            position: fixed; bottom: 20px; left: 16px; right: 16px; height: 68px;
            border-radius: 24px; z-index: 100; display: flex; align-items: center; justify-content: space-around;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #64748B; transition: all 0.3s ease; width: 20%; cursor: pointer;}
        .nav-item.active { color: #3B82F6; transform: translateY(-2px); }
        .nav-text { font-size: 10px; font-weight: 600; }
        
        /* Center Floating Action Button */
        .center-fab {
            position: relative; top: -15px; width: 56px; height: 56px; border-radius: 20px;
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
            border: 4px solid #0A0F1C; color: white; transition: transform 0.2s;
        }
        .center-fab:active { transform: scale(0.9) translateY(-15px); }

        /* Custom Scrollbar hide */
        ::-webkit-scrollbar { display: none; }

        /* Toast Animation */
        .toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #10B981; color: white; padding: 12px 24px; border-radius: 100px;
            font-weight: 600; font-size: 14px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
        }
        .toast.show { top: 20px; }
    </style>
</head>
<body class="pb-28">

    <!-- Toast Notification -->
    <div id="toast" class="toast flex items-center gap-2">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span id="toast-msg">Muvaffaqiyatli!</span>
    </div>

    <div class="px-5 pt-8">
        <!-- Header -->
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700 overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=1e293b" alt="Avatar">
                </div>
                <div>
                    <p class="text-xs text-slate-400 font-medium">Xush kelibsiz</p>
                    <h1 class="text-lg font-bold">Alijonov A.</h1>
                </div>
            </div>
            <div class="flex gap-3">
                <button class="w-10 h-10 rounded-full glass-card flex items-center justify-center text-slate-300 relative">
                    <i data-lucide="scan-line" class="w-5 h-5"></i>
                </button>
                <button class="w-10 h-10 rounded-full glass-card flex items-center justify-center text-slate-300 relative">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>
            </div>
        </header>

        <!-- Total Balance Card (Binance Style) -->
        <div class="balance-card rounded-3xl p-6 mb-8 shadow-2xl">
            <div class="relative z-10">
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <p class="text-sm text-slate-400 font-medium">Umumiy balans</p>
                        <button id="toggle-balance" class="text-slate-400 hover:text-white transition-colors">
                            <i id="eye-icon" data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="flex items-center gap-1 bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded-lg text-[10px] font-bold">
                        <i data-lucide="trending-up" class="w-3 h-3"></i> +2.45%
                    </div>
                </div>
                
                <h2 class="text-4xl font-extrabold text-white tracking-tight mb-6" id="balance-amount">
                    $12,450.<span class="text-2xl text-slate-400">80</span>
                </h2>

                <div class="flex gap-3">
                    <button onclick="actionToast('Hisobingiz muvaffaqiyatli to\'ldirildi!')" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-4 rounded-2xl flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-[0_0_15px_rgba(37,99,235,0.5)]">
                        <i data-lucide="arrow-down-to-line" class="w-5 h-5"></i>
                        To'ldirish
                    </button>
                    <button onclick="actionToast('Pul muvaffaqiyatli yechib olindi!')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-semibold py-3 px-4 border border-slate-700 rounded-2xl flex items-center justify-center gap-2 transition-transform active:scale-95">
                        <i data-lucide="arrow-up-from-line" class="w-5 h-5"></i>
                        Yechish
                    </button>
                </div>
            </div>
        </div>

        <!-- Services Grid (Paynet Style) -->
        <div class="mb-8">
            <div class="flex justify-between items-end mb-4">
                <h3 class="text-lg font-bold">Xizmatlar</h3>
                <button class="text-blue-500 text-xs font-semibold">Tahrirlash</button>
            </div>
            
            <div class="grid grid-cols-4 gap-y-6 gap-x-2">
                <!-- Service 1 -->
                <button onclick="actionToast('Aloqa bo\'limi ochilmoqda...')" class="flex flex-col items-center gap-2 active:scale-90 transition-transform">
                    <div class="w-12 h-12 rounded-[18px] bg-blue-500/15 flex items-center justify-center text-blue-500">
                        <i data-lucide="smartphone" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[11px] font-semibold text-slate-300">Aloqa</span>
                </button>
                <!-- Service 2 -->
                <button onclick="actionToast('Internet bo\'limi ochilmoqda...')" class="flex flex-col items-center gap-2 active:scale-90 transition-transform">
                    <div class="w-12 h-12 rounded-[18px] bg-purple-500/15 flex items-center justify-center text-purple-400">
                        <i data-lucide="wifi" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[11px] font-semibold text-slate-300">Internet</span>
                </button>
                <!-- Service 3 -->
                <button onclick="actionToast('Kommunal to\'lovlar ochilmoqda...')" class="flex flex-col items-center gap-2 active:scale-90 transition-transform">
                    <div class="w-12 h-12 rounded-[18px] bg-emerald-500/15 flex items-center justify-center text-emerald-400">
                        <i data-lucide="droplets" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[11px] font-semibold text-slate-300">Kommunal</span>
                </button>
                <!-- Service 4 -->
                <button onclick="actionToast('P2P O\'tkazma ochilmoqda...')" class="flex flex-col items-center gap-2 active:scale-90 transition-transform">
                    <div class="w-12 h-12 rounded-[18px] bg-orange-500/15 flex items-center justify-center text-orange-400">
                        <i data-lucide="send" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[11px] font-semibold text-slate-300">O'tkazma</span>
                </button>
                <!-- Service 5 -->
                <button onclick="actionToast('Kripto hamyon ochilmoqda...')" class="flex flex-col items-center gap-2 active:scale-90 transition-transform">
                    <div class="w-12 h-12 rounded-[18px] bg-yellow-500/15 flex items-center justify-center text-yellow-400">
                        <i data-lucide="bitcoin" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[11px] font-semibold text-slate-300">Kripto</span>
                </button>
                <!-- Service 6 -->
                <button onclick="actionToast('Davlat xizmatlari ochilmoqda...')" class="flex flex-col items-center gap-2 active:scale-90 transition-transform">
                    <div class="w-12 h-12 rounded-[18px] bg-red-500/15 flex items-center justify-center text-red-400">
                        <i data-lucide="landmark" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[11px] font-semibold text-slate-300">Davlat</span>
                </button>
                <!-- Service 7 -->
                <button onclick="actionToast('Soliq to\'lovlari ochilmoqda...')" class="flex flex-col items-center gap-2 active:scale-90 transition-transform">
                    <div class="w-12 h-12 rounded-[18px] bg-teal-500/15 flex items-center justify-center text-teal-400">
                        <i data-lucide="file-text" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[11px] font-semibold text-slate-300">Soliqlar</span>
                </button>
                <!-- Service 8 -->
                <button class="flex flex-col items-center gap-2 active:scale-90 transition-transform">
                    <div class="w-12 h-12 rounded-[18px] bg-slate-800 flex items-center justify-center text-slate-400 border border-slate-700">
                        <i data-lucide="grid-2x2" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[11px] font-semibold text-slate-300">Barchasi</span>
                </button>
            </div>
        </div>

        <!-- Recent Transactions -->
        <div>
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">Tarix</h3>
                <button class="text-blue-500 text-xs font-semibold">Hammasi</button>
            </div>
            
            <div class="space-y-3">
                <!-- Transaction 1 -->
                <div class="glass-card p-4 rounded-2xl flex items-center justify-between active:bg-slate-800 transition-colors cursor-pointer">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center">
                            <img src="https://api.dicebear.com/7.x/initials/svg?seed=Netflix&backgroundColor=E50914" class="w-full h-full rounded-full p-1" alt="Netflix">
                        </div>
                        <div>
                            <p class="font-bold text-sm">Netflix</p>
                            <p class="text-[11px] text-slate-400">Bugun, 14:30 • Obuna</p>
                        </div>
                    </div>
                    <p class="font-bold text-sm">-$15.99</p>
                </div>
                <!-- Transaction 2 -->
                <div class="glass-card p-4 rounded-2xl flex items-center justify-between active:bg-slate-800 transition-colors cursor-pointer">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400">
                            <i data-lucide="arrow-down-left" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="font-bold text-sm">Qabul qilindi</p>
                            <p class="text-[11px] text-slate-400">Kecha, 09:15 • Oylik maosh</p>
                        </div>
                    </div>
                    <p class="font-bold text-sm text-emerald-400">+$3,250.00</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="nav-bottom-bar glass-nav">
        <div class="nav-item active" onclick="switchTab(this)">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="nav-text">Asosiy</span>
        </div>
        <div class="nav-item" onclick="switchTab(this)">
            <i data-lucide="pie-chart" class="w-6 h-6"></i>
            <span class="nav-text">Bozor</span>
        </div>
        
        <!-- Center Action -->
        <div class="nav-item" onclick="actionToast('Kamera orqali QR Skaner ochildi!')">
            <div class="center-fab">
                <i data-lucide="qr-code" class="w-6 h-6"></i>
            </div>
            <span class="nav-text" style="margin-top: -10px;">To'lov</span>
        </div>

        <div class="nav-item" onclick="switchTab(this)">
            <i data-lucide="credit-card" class="w-6 h-6"></i>
            <span class="nav-text">Kartalar</span>
        </div>
        <div class="nav-item" onclick="switchTab(this)">
            <i data-lucide="user" class="w-6 h-6"></i>
            <span class="nav-text">Profil</span>
        </div>
    </nav>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Balance Toggle Logic
        let isBalanceVisible = true;
        const toggleBtn = document.getElementById('toggle-balance');
        const balanceAmount = document.getElementById('balance-amount');
        const eyeIcon = document.getElementById('eye-icon');
        
        // Save the original HTML to restore it later
        const originalBalanceHTML = balanceAmount.innerHTML;

        toggleBtn.addEventListener('click', () => {
            isBalanceVisible = !isBalanceVisible;
            if (isBalanceVisible) {
                balanceAmount.innerHTML = originalBalanceHTML;
                eyeIcon.setAttribute('data-lucide', 'eye');
            } else {
                balanceAmount.innerHTML = '****.**';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            }
            lucide.createIcons(); // Re-render the new icon
        });

        // Tab Switching Logic
        function switchTab(element) {
            document.querySelectorAll('.nav-item').forEach(nav => {
                nav.classList.remove('active');
            });
            element.classList.add('active');
        }

        // Action Toast Notification Logic
        let toastTimeout;
        function actionToast(msg) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            
            toastMsg.textContent = msg;
            toast.classList.add('show');
            
            // Haptic feedback (if supported by device)
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
